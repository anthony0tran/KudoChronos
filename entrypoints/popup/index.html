<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Default Popup Title</title>
    <meta name="manifest.type" content="browser_action" />
    <style>
      html, body { margin: 0; padding: 0; background: #121212; }
      #root { background: #121212; }
      .pre-load {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 46px 14px;
        width: 360px;
        box-sizing: border-box;
      }
      .pre-load span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3f51b5;
        animation: pb 1.2s ease-in-out infinite;
      }
      .pre-load span:nth-child(2) { animation-delay: 0.2s; }
      .pre-load span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pb {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40%            { transform: scale(1);   opacity: 1;   }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pre-load">
        <span></span><span></span><span></span>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
